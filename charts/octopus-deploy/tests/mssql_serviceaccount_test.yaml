suite: mssql serviceaccount
templates:
  - charts/mssql/templates/serviceaccount.yaml

tests:
  - it: renders by default
    values:
      - ./values/required.yaml
      - ./values/mssql.yaml
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ServiceAccount
        documentIndex: 0

  - it: does not render when create is false
    values:
      - ./values/required.yaml
      - ./values/mssql.yaml
    set:
      mssql.serviceAccount.create: false
      mssql.serviceAccount.name: "preexisting-sa"
    asserts:
      - hasDocuments:
          count: 0

  - it: uses generated default name when create is true and name is empty
    values:
      - ./values/required.yaml
      - ./values/mssql.yaml
    set:
      mssql.serviceAccount.create: true
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-octopus-deploy-mssql
        documentIndex: 0

  - it: uses provided name when create is true and name is set
    values:
      - ./values/required.yaml
      - ./values/mssql.yaml
    set:
      mssql.serviceAccount.create: true
      mssql.serviceAccount.name: "custom-mssql-sa"
    asserts:
      - equal:
          path: metadata.name
          value: custom-mssql-sa
        documentIndex: 0

  - it: honors automountServiceAccountToken false by default
    values:
      - ./values/required.yaml
      - ./values/mssql.yaml
    asserts:
      - equal:
          path: automountServiceAccountToken
          value: false
        documentIndex: 0

  - it: honors automountServiceAccountToken true when set
    values:
      - ./values/required.yaml
      - ./values/mssql.yaml
    set:
      mssql.serviceAccount.automountServiceAccountToken: true
    asserts:
      - equal:
          path: automountServiceAccountToken
          value: true
        documentIndex: 0

  - it: labels are configurable
    values:
      - ./values/required.yaml
      - ./values/mssql.yaml
    set:
      mssql.serviceAccount.labels:
        label1: "example"
        label2: "example2"
    asserts:
      - equal:
          path: metadata.labels.label1
          value: "example"
        documentIndex: 0
      - equal:
          path: metadata.labels.label2
          value: "example2"
        documentIndex: 0

  - it: annotations are configurable
    values:
      - ./values/required.yaml
      - ./values/mssql.yaml
    set:
      mssql.serviceAccount.annotations:
        example.com/annotation: "example"
        example.com/annotation2: "example2"
    asserts:
      - equal:
          path: metadata.annotations["example.com/annotation"]
          value: "example"
        documentIndex: 0
      - equal:
          path: metadata.annotations["example.com/annotation2"]
          value: "example2"
        documentIndex: 0
