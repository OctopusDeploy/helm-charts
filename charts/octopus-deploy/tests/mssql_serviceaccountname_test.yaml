suite: mssql serviceAccountName resolution (statefulset)
templates:
  - charts/mssql/templates/statefulset.yaml

tests:
  - it: statefulset uses default generated SA name when create is true and name is empty
    values:
      - ./values/required.yaml
      - ./values/mssql.yaml
    set:
      mssql.serviceAccount.create: true
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: RELEASE-NAME-octopus-deploy-mssql
        documentIndex: 0

  - it: statefulset uses provided SA name when create is true
    values:
      - ./values/required.yaml
      - ./values/mssql.yaml
    set:
      mssql.serviceAccount.create: true
      mssql.serviceAccount.name: "custom-mssql-sa"
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: custom-mssql-sa
        documentIndex: 0

  - it: statefulset references preexisting SA when create is false and name is provided
    values:
      - ./values/required.yaml
      - ./values/mssql.yaml
    set:
      mssql.serviceAccount.create: false
      mssql.serviceAccount.name: "preexisting-sa"
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: preexisting-sa
        documentIndex: 0

  - it: rendering fails when create is false and name is empty
    values:
      - ./values/required.yaml
      - ./values/mssql.yaml
    set:
      mssql.serviceAccount.create: false
      mssql.serviceAccount.name: ""
    asserts:
      - failedTemplate:
          errorMessage: "A valid .Values.serviceAccount.name is required when .Values.serviceAccount.create is false"
