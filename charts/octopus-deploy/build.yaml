# Source: octopusdeploy-helm/charts/mssql/templates/statefulset.yaml
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mssql
  labels:
    app.kubernetes.io/name: octopus-deploy
    helm.sh/chart: mssql-0.0.1
    app.kubernetes.io/instance: octopus-deploy
    app.kubernetes.io/managed-by: Helm
spec:
  serviceName: octopus-deploy-mssql
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: octopus-deploy
      helm.sh/chart: mssql-0.0.1
      app.kubernetes.io/instance: octopus-deploy
      app.kubernetes.io/managed-by: Helm
      app.kubernetes.io/component: mssql
  template:
    metadata:
      labels:
        app.kubernetes.io/name: octopus-deploy
        helm.sh/chart: mssql-0.0.1
        app.kubernetes.io/instance: octopus-deploy
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/component: mssql
    spec:
      securityContext:
        fsGroup: 10001
      containers:
        - name: mssql
          command:
            - /bin/bash
            - -c
            - cp /var/opt/config/mssql.conf /var/opt/mssql/mssql.conf && /opt/mssql/bin/sqlservr
          image: "mcr.microsoft.com/mssql/server:2022-latest"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 1433
          env:
            - name: MSSQL_PID
              value: "Developer"
            - name: ACCEPT_EULA
              value: "Y"
            - name: MSSQL_AGENT_ENABLED
              value: "false"
            - name: SA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mssql
                  key: sa_password
          volumeMounts:
            - name: mssql
              mountPath: "/var/opt/mssql"
            - name: mssql-config-volume
              mountPath: /var/opt/config
      volumes:
      - name: mssql-config-volume
        configMap:
          name: mssql
  volumeClaimTemplates:
    - metadata:
        name: mssql
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 8Gi
