{{- if not .Values.scriptPods.serviceAccount.useNamespacedRoles }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kubernetes-agent.autoUpgraderClusterRoleName" . }}
rules:
{{- if .Values.autoUpgrader.clusterRoleRules }}
{{- if not (kindIs "slice" .Values.autoUpgrader.clusterRoleRules) }}
{{- fail "autoUpgrader.clusterRoleRules must be a list of RBAC rule objects" }}
{{- end }}
{{ .Values.autoUpgrader.clusterRoleRules | toYaml | nindent 2 }}
{{- else }}
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["*"]
{{- end }}
{{- end }}
