{{- if .Values.agent.worker.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "kubernetes-agent.scriptPodWorkerRoleName" . }}
  namespace: {{ $.Release.Namespace | quote }}
rules:
{{- if .Values.scriptPods.workerRoleRules }}
{{- if not (kindIs "slice" .Values.scriptPods.workerRoleRules) }}
{{- fail "scriptPods.workerRoleRules must be a list of RBAC rule objects" }}
{{- end }}
{{ .Values.scriptPods.workerRoleRules | toYaml | nindent 2 }}
{{- else }}
  # Wildcards are retained because worker pods execute arbitrary user scripts and the required permissions are not predictable
  - apiGroups:
      - '*'
    resources:
      - '*'
    verbs:
      - '*'
{{- end }}
{{- end -}}

{{- $podServiceAccountName := include "kubernetes-agent.scriptPodServiceAccountName" . -}}
{{- $podServiceAccountFullName := include "kubernetes-agent.scriptPodServiceAccountFullName" . -}}
{{- $podRoleName := include "kubernetes-agent.scriptPodRoleName" . -}}
{{- $targetNamespaces := include "kubernetes-agent.targetNamespaces" . | fromJsonArray -}}

{{- if and .Values.scriptPods.serviceAccount.useNamespacedRoles (not (empty $targetNamespaces)) }}
{{- range $targetNamespace := $targetNamespaces }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $podRoleName }}
  namespace: {{ $targetNamespace | quote }}
rules:
{{- if $.Values.scriptPods.serviceAccount.roleRules }}
{{- if not (kindIs "slice" $.Values.scriptPods.serviceAccount.roleRules) }}
{{- fail "scriptPods.serviceAccount.roleRules must be a list of RBAC rule objects" }}
{{- end }}
{{ $.Values.scriptPods.serviceAccount.roleRules | toYaml | nindent 2 }}
{{- else }}
# Wildcards are retained because script pods execute arbitrary user scripts and the required permissions are not predictable
- apiGroups:
  - '*'
  resources:
  - '*'
  verbs:
  - '*'
{{- end }}
{{- end }}
{{- end }}