apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ printf "%s-role" (include "kubernetes-agent.preinstall.serviceAccountName" .) }}
  namespace: {{ .Release.Namespace | quote }}
  annotations:
    {{- include "kubernetes-agent.hookAnnotationsWithSuccessDelete" . | nindent 4 }}
rules:
{{- if .Values.agent.preinstall.roleRules }}
{{- if not (kindIs "slice" .Values.agent.preinstall.roleRules) }}
{{- fail "agent.preinstall.roleRules must be a list of RBAC rule objects" }}
{{- end }}
{{ .Values.agent.preinstall.roleRules | toYaml | nindent 2 }}
{{- else }}
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
{{- end }}
