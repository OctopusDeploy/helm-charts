{{- if and .Values.scriptPods.serviceAccount.clusterRole.enabled (not .Values.scriptPods.serviceAccount.useNamespacedRoles)}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kubernetes-agent.scriptPodClusterRoleName" . }}
rules:
{{- $overrideRules := include "kubernetes-agent.renderRbacRules" (dict "rules" .Values.scriptPods.serviceAccount.clusterRole.rules "name" "scriptPods.serviceAccount.clusterRole.rules") }}
{{- if $overrideRules }}
{{ $overrideRules | nindent 2 }}
{{- else }}
- apiGroups:
  - '*'
  resources:
  - '*'
  verbs:
  - '*'
- nonResourceURLs:
  - '*'
  verbs:
  - '*'
{{- end }}
{{- if and (include "nfs.enabled" .) .Values.persistence.nfs.watchdog.enabled }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kubernetes-agent.scriptPodDeleterClusterRoleName" . }}
rules:
  - apiGroups:
      - ''
    resources:
      - 'pods'
    verbs:
      - 'delete'
      - 'list'
{{- end }}
{{- end }}