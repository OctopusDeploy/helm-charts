suite: "persistence"
templates:
- templates/nfs-pvc.yaml
tests:
- it: "should match snapshot"
  set:
    persistence:
      accessModes: ["ReadWriteMany"]
      nfs:
        enabled: true
  asserts:
  - matchSnapshot: {}
- it: "is not created when nfs is disabled (default)"
  asserts:
  - hasDocuments:
      count: 0

- it: "is created when nfs is enabled"
  set:
    persistence:
      accessModes: ["ReadWriteMany"]
      nfs:
        enabled: true
  asserts:
  - hasDocuments:
      count: 1
