suite: "persistence"
templates:
- templates/nfs-pv.yaml
tests:
- it: "should match snapshot"
  set:
    persistence:
      nfs:
        enabled: true
  asserts:
  - matchSnapshot: {}

- it: "is not created when  nfs is disabled"
  set:
    persistence:
      nfs:
        enabled: false
  asserts:
  - hasDocuments:
      count: 0

- it: "is created when nfs is enabled"
  set:
    persistence:
      nfs:
        enabled: true
  asserts:
  - hasDocuments:
      count: 1

- it: "has Helm Release name in name"
  set:
    persistence:
      nfs:
        enabled: true
  asserts:
  - matchRegex:
      path: metadata.name
      pattern: "release-name"

- it: "set storage capacity to be persistence size"
  set:
    persistence:      
      nfs:
        enabled: true
      size: 100Gi
  asserts:
  - equal:
      path: spec.capacity.storage
      value: 100Gi

- it: "uses NFS service DNS as server address"
  set:
    persistence:
      nfs:
        enabled: true
  asserts:
  - equal:
      path: spec.csi.volumeAttributes.server
      value: octopus-agent-nfs.NAMESPACE.svc.cluster.local
  - equal:
      path: spec.csi.volumeAttributes.share
      value: "/"

