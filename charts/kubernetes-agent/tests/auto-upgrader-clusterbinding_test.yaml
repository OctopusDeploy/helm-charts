suite: "pod permissions"
templates:
- templates/auto-upgrader-clusterbinding.yaml
tests:
- it: "should match snapshot"
  asserts:
  - matchSnapshot: {}

- it: "should reference the custom service account name in the binding"
  set:
    autoUpgrader:
      serviceAccount:
        name: "my-custom-sa"
  asserts:
  - equal:
      path: subjects[0].name
      value: "my-custom-sa"

- it: "is not created when useNamespacedRoles is true"
  set:
    scriptPods:
      serviceAccount:
        useNamespacedRoles: true
  asserts:
  - hasDocuments:
      count: 0