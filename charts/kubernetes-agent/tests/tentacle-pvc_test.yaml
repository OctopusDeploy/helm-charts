suite: "persistence"
templates:
- templates/tentacle-pvc.yaml
tests:
- it: "should match snapshot when storageClassName is not set and nfs is disabled"
  set:
    persistence:
      nfs:
        enabled: false
  asserts:
    - matchSnapshot: {}

- it: "should match snapshot when storageClassName is set and nfs is disabled"
  set:
    persistence:
      storageClassName: "my-storage-class"
      nfs:
        enabled: false
  asserts:
    - matchSnapshot: {}

- it: "should match snapshot when volumeName is set and nfs is disabled"
  set:
    persistence:
      volumeName: "my-volume"
      nfs:
        enabled: false
  asserts:
    - matchSnapshot: {}

    
- it: "should match snapshot when storageClassName is set to \"-\" and nfs is disabled"
  set:
    persistence:
      storageClassName: "-"
      volumeName: "my-volume"
      nfs:
        enabled: false
  asserts:
    - matchSnapshot: {}

- it: "is not created when nfs is enabled"
  set:
    persistence:
      nfs:
        enabled: true
  asserts:
  - hasDocuments:
      count: 0

- it: "can have the size changed"
  set:
    persistence:
      storageClassName: "my-storage-class"
      size: 16Gi
  asserts:
  - hasDocuments:
      count: 1
  - equal:
      path: spec.resources.requests.storage
      value: 16Gi

