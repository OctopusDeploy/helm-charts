suite: "pod permissions"
templates:
- templates/pod-clusterroles.yaml
tests:
- it: "cluster role can have rules overridden"
  set:
    scriptPods:
      serviceAccount:
        clusterRole:
          rules:
          - apiGroups:
            - ''
            resources: ["pods"]
            verbs: ["get", "watch", "list"]
  asserts:
    - contains:
        path: rules
        content:
          apiGroups:
          - ''
          resources: ["pods"]
          verbs: ["get", "watch", "list"]
      documentIndex: 0
    - contains:
        path: rules
        content:
          apiGroups:
          - ''
          resources: ["pods"]
          verbs: ["delete", "list"]
      documentIndex: 1

- it: "should match snapshot"
  asserts:
  - matchSnapshot: {}

- it: "is not created when useNamespacedRoles is true"
  set:
    scriptPods:
      serviceAccount:
        useNamespacedRoles: true
  asserts:
  - hasDocuments:
      count: 0

- it: "deleter ClusterRole should scope to core API group only"
  set:
    persistence:
      nfs:
        watchdog:
          enabled: true
  asserts:
    - contains:
        path: rules
        content:
          apiGroups: [""]
          resources: ["pods"]
          verbs: ["delete", "list"]
      documentIndex: 1

- it: "should fail when scriptPods.serviceAccount.clusterRole.rules is not a list"
  set:
    scriptPods:
      serviceAccount:
        clusterRole:
          rules: "not-a-list"
  asserts:
    - failedTemplate:
        errorMessage: "scriptPods.serviceAccount.clusterRole.rules must be a list of RBAC rule objects"
