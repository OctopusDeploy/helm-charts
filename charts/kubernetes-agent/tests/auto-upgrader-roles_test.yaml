suite: "auto-upgrader namespace-scoped roles"
templates:
- templates/auto-upgrader-roles.yaml
tests:
- it: "is not created when useNamespacedRoles is false"
  set:
    scriptPods:
      serviceAccount:
        useNamespacedRoles: false
        targetNamespaces: ["ns-1", "ns-2"]
  asserts:
  - hasDocuments:
      count: 0

- it: "creates self-namespace role when useNamespacedRoles is true"
  set:
    scriptPods:
      serviceAccount:
        useNamespacedRoles: true
        targetNamespaces: []
  asserts:
  - hasDocuments:
      count: 1
  - equal:
      path: kind
      value: Role
  - equal:
      path: metadata.namespace
      value: NAMESPACE
  - contains:
      path: rules
      content:
        apiGroups: ["*"]
        resources: ["*"]
        verbs: ["*"]

- it: "creates self-namespace and target namespace roles"
  set:
    scriptPods:
      serviceAccount:
        useNamespacedRoles: true
        targetNamespaces: ["ns-1", "ns-2"]
  asserts:
  - hasDocuments:
      count: 3  # 1 self-namespace + 2 target namespaces

- it: "should use default target-namespace rules with escalate verb when no override is provided"
  set:
    scriptPods:
      serviceAccount:
        useNamespacedRoles: true
        targetNamespaces: ["ns-1"]
  asserts:
  - contains:
      path: rules
      content:
        apiGroups: ["rbac.authorization.k8s.io"]
        resources: ["roles", "rolebindings"]
        verbs: ["create", "update", "patch", "get", "list", "watch", "delete"]
    documentIndex: 1
  - contains:
      path: rules
      content:
        apiGroups: ["rbac.authorization.k8s.io"]
        resources: ["roles"]
        verbs: ["escalate"]
    documentIndex: 1

- it: "uses custom selfNamespaceRoleRules when provided"
  set:
    scriptPods:
      serviceAccount:
        useNamespacedRoles: true
        targetNamespaces: []
    autoUpgrader:
      selfNamespaceRoleRules:
      - apiGroups: ["apps"]
        resources: ["deployments"]
        verbs: ["get", "update"]
  asserts:
  - hasDocuments:
      count: 1
  - contains:
      path: rules
      content:
        apiGroups: ["apps"]
        resources: ["deployments"]
        verbs: ["get", "update"]
  - lengthEqual:
      path: rules
      count: 1

- it: "uses custom targetNamespaceRoleRules when provided"
  set:
    scriptPods:
      serviceAccount:
        useNamespacedRoles: true
        targetNamespaces: ["ns-1"]
    autoUpgrader:
      targetNamespaceRoleRules:
      - apiGroups: ["rbac.authorization.k8s.io"]
        resources: ["roles"]
        verbs: ["create", "update"]
  asserts:
  - hasDocuments:
      count: 2  # 1 self-namespace + 1 target namespace
  - contains:
      path: rules
      content:
        apiGroups: ["rbac.authorization.k8s.io"]
        resources: ["roles"]
        verbs: ["create", "update"]
    documentIndex: 1
  - lengthEqual:
      path: rules
      count: 1
    documentIndex: 1

- it: "should fail when autoUpgrader.selfNamespaceRoleRules is not a list"
  set:
    scriptPods:
      serviceAccount:
        useNamespacedRoles: true
    autoUpgrader:
      selfNamespaceRoleRules: "not-a-list"
  asserts:
    - failedTemplate:
        errorMessage: "autoUpgrader.selfNamespaceRoleRules must be a list of RBAC rule objects"

- it: "should fail when autoUpgrader.targetNamespaceRoleRules is not a list"
  set:
    scriptPods:
      serviceAccount:
        useNamespacedRoles: true
        targetNamespaces: ["ns-1"]
    autoUpgrader:
      targetNamespaceRoleRules: "not-a-list"
  asserts:
    - failedTemplate:
        errorMessage: "autoUpgrader.targetNamespaceRoleRules must be a list of RBAC rule objects"
