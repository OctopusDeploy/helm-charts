suite: "pod permissions"
templates:
- templates/auto-upgrader-clusterrole.yaml
tests:
- it: "should match snapshot"
  asserts:
  - matchSnapshot: {}

- it: "is not created when useNamespacedRoles is true"
  set:
    scriptPods:
      serviceAccount:
        useNamespacedRoles: true
  asserts:
  - hasDocuments:
      count: 0

- it: "should use wildcard default rules when no override is provided"
  asserts:
  - contains:
      path: rules
      content:
        apiGroups: ["*"]
        resources: ["*"]
        verbs: ["*"]

- it: "should use custom rules when autoUpgrader.clusterRoleRules is set"
  set:
    autoUpgrader:
      clusterRoleRules:
        - apiGroups: ["apps"]
          resources: ["deployments"]
          verbs: ["get", "list", "update"]
  asserts:
  - equal:
      path: rules[0].apiGroups[0]
      value: apps
  - equal:
      path: rules[0].resources[0]
      value: deployments
  - equal:
      path: rules[0].verbs[0]
      value: get
  - lengthEqual:
      path: rules
      count: 1
