suite: "auto-upgrader service account"
templates:
- templates/auto-upgrader-serviceaccount.yaml
tests:
- it: "should match snapshot"
  asserts:
  - matchSnapshot: {}

- it: "should derive service account name from nameOverride"
  set:
    agent:
      targetName: "test"
    nameOverride: "test_test"
  asserts:
  - equal:
      path: "metadata.name"
      value: "test_test-auto-upgrader"

- it: "should use default service account name without overrides"
  asserts:
  - equal:
      path: "metadata.name"
      value: "octopus-agent-auto-upgrader"

- it: "should use custom service account name when autoUpgrader.serviceAccount.name is set"
  set:
    autoUpgrader:
      serviceAccount:
        name: "my-custom-sa"
  asserts:
  - equal:
      path: "metadata.name"
      value: "my-custom-sa"

- it: "should truncate derived service account name to 63 characters when nameOverride is long"
  set:
    nameOverride: "thisisaverylongstring34087236548972364802367y408923604872341234141"
  asserts:
  - equal:
      path: "metadata.name"
      value: "thisisaverylongstring34087236548972364802367y408923604872341234"
