suite: "pod permissions"
templates:
- templates/pod-rolebindings.yaml
tests:
- it: "creates a role binding per target namespace"
  set:
    scriptPods:
      serviceAccount:
        targetNamespaces: ["ns-1", "ns-2", "ns-3"]
    agent.deploymentTarget.enabled: true
  asserts:
  - hasDocuments:
      count: 3

- it: "matches snapshot with one target namespace"
  set:
    scriptPods:
      serviceAccount:
        targetNamespaces: ["ns-1"]
    agent.deploymentTarget.enabled: true
  asserts:
  - matchSnapshot: {}

- it: "only creates the default rolebinding when target namespaces is empty and nfs and watchdog is enabled"
  set:
    persistence:
      accessModes: ["ReadWriteMany"]
      nfs:
        enabled: true
        watchdog:
          enabled: true
    scriptPods:
      serviceAccount:
        targetNamespaces: []
    agent.deploymentTarget.enabled: true
  asserts:
  - hasDocuments:
      count: 1
  - equal: 
        path: metadata.namespace
        value: NAMESPACE

- it: "only creates the default rolebinding by default"
  set:
    agent.deploymentTarget.enabled: true
    persistence:
      accessModes: ["ReadWriteMany"]
      nfs:
        enabled: true
        watchdog:
          enabled: true
  asserts:
  - hasDocuments:
      count: 1
  - equal:
      path: metadata.namespace
      value: NAMESPACE

- it: "is not created when nfs is disabled (default)"
  set:
    agent.deploymentTarget.enabled: true
  asserts:
    - hasDocuments:
        count: 0

- it: "is not created when watchdog is disabled"
  set:
    persistence:
      accessModes: ["ReadWriteMany"]
      nfs:
        enabled: true
        watchdog:
          enabled: false
    agent.deploymentTarget.enabled: true
  asserts:
    - hasDocuments:
        count: 0
        
- it: "creates 1 role-bindings when DeploymentTarget is disabled and nfs and watchdog are enabled"
  set:
    agent.deploymentTarget.enabled: false
    scriptPods.serviceAccount.targetNamespaces: ["ns-1", "ns-2", "ns-3"]
    persistence:
      accessModes: ["ReadWriteMany"]
      nfs:
        enabled: true
        watchdog:
          enabled: true
  asserts:
    - hasDocuments:
        count: 1