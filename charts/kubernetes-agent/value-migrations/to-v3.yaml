persistence:
  {{- if .persistence.storageClassName }}
  storageClassName: {{ .persistence.storageClassName}}
  {{- end}}  
  {{- if .persistence.volumeName }}
  volumeName: {{ .persistence.volumeName}}
  {{- end}}
  nfs:
    {{- if or .persistence.storageClassName .persistence.volumeName }}
    enabled: false
    {{- else }}
    enabled: true
    {{- end }}